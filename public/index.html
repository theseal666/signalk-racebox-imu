<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RaceBox IMU Live</title>
  <link rel="stylesheet" href="style.css?v=1.3.0">
</head>
<body>
  <header>
    <span class="title">RaceBox IMU</span>
    <span id="conn-badge" class="badge offline">● OFFLINE</span>
  </header>

  <div id="stats">
    <div class="stat">
      <div class="stat-label">Hs</div>
      <div class="stat-value" id="val-hs">–</div>
      <div class="stat-unit">m</div>
    </div>
    <div class="stat">
      <div class="stat-label">Period</div>
      <div class="stat-value" id="val-period">–</div>
      <div class="stat-unit">s</div>
    </div>
    <div class="stat">
      <div class="stat-label">Slam</div>
      <div class="stat-value" id="val-slam">–</div>
      <div class="stat-unit">m/s²</div>
    </div>
  </div>

  <div id="chart-container">
    <canvas id="heave-canvas"></canvas>
  </div>

  <div id="attitude">
    <canvas id="horizon-canvas"></canvas>
    <div id="attitude-values">
      <div class="att-row">Pitch <span id="val-pitch">–</span></div>
      <div class="att-row">Roll <span id="val-roll">–</span></div>
    </div>
  </div>

  <script src="app.js?v=1.3.0"></script>
</body>
</html>
